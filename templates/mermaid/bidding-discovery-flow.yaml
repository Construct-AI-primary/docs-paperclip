name: bidding-discovery-flow
version: "1.0"
description: "Bidding discovery pipeline — OCDS API ingestion with web scraping fallback, field mapping, opportunity scoring, and pipeline storage"
parameters:
  - name: discipline
    type: string
    default: "BTND"
    description: "Discipline code (BTND for Bidding & Tendering)"
  - name: showScraping
    type: boolean
    default: true
    description: "Whether to show the web scraping fallback path"
template: |
  flowchart TD
    OCDS[OCDS API] -->|fetch notices| PARSE[Parse Tender Notices]
    OCDS -->|fetch failed| FALLBACK{API Available?}
    FALLBACK -->|no| SCRAPE[Web Scraper]
    FALLBACK -->|yes| PARSE

    SCRAPE -->|extract structured data| EXTRACT[Extract Structured Data]
    EXTRACT -->|normalize| MAP[Map Fields to Standard Schema]
    PARSE -->|normalize| MAP

    MAP -->|validate| SCORE[Score Opportunity]
    SCORE -->|match criteria| ROUTE{Route Decision}
    SCORE -->|no match| DISCARD[Discard / Log]

    ROUTE -->|high priority| PIPELINE[Bid Opportunity Pipeline]
    ROUTE -->|standard priority| PIPELINE
    ROUTE -->|low priority| ALERT[Alert Team]

    PIPELINE -->|store| DB[(Database)]
    ALERT -->|notify| TEAM[Assignment to Bid Team]

    classDef api fill:#e3f2fd,stroke:#1976d2
    classDef scrape fill:#fff3e0,stroke:#f57c00
    classDef map fill:#f3e5f5,stroke:#7b1fa2
    classDef score fill:#ffebee,stroke:#d32f2f
    classDef store fill:#e8f5e8,stroke:#388e3c

    class OCDS,PARSE api
    class FALLBACK,SCRAPE,EXTRACT scrape
    class MAP,SCORE,ROUTE map
    class DISCARD,ALERT,TEAM score
    class PIPELINE,DB store