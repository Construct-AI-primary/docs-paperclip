# Recurring task routines
routines:
  weekly-learning-analysis:
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * 1"
        timezone: UTC

  weekly-safety-research:
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * 1"
        timezone: UTC

  weekly-autoresearch-cycle:
    triggers:
      - kind: schedule
        cronExpression: "0 2 * * 0"
        timezone: UTC

  daily-knowledge-hygiene:
    triggers:
      - kind: schedule
        cronExpression: "0 1 * * *"
        timezone: UTC
