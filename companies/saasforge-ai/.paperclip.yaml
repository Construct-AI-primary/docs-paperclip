      - company:saasforge-ai:customer-success

  analytics-specialist:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-7-20250514
    budgetMonthlyCents: 4000
    permissions:
      - company:saasforge-ai:analytics

  support-integrator:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-7-20250514
