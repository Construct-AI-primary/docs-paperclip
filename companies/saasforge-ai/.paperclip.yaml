        RENDER_API_KEY:
          kind: secret
          requirement: required
    budgetMonthlyCents: 5000
    permissions:
      - render:admin

# Global Company Settings
company:
  name: SaaSForge AI
  type: orchestrator
  industry: SaaS Operations & Customer Success Automation
  
# Multi-Tenant Platform Settings
platform:
  deployment_target: render
  git_provider: github
  
  per_company_structure:
    repos: true  # Each company gets own repo
    branches:
      - main  # Production (client sees)
      - dev   # Development (team works)
    render_services:
      - production  # {company}.saasforge.ai
      - development # dev.{company}.saasforge.ai
  
  client_onboarding:
    automated: true
    template_repo: template/client-system-template
    default_plan: professional

# Routine Schedules
routines:
  daily-deployment-queue:
    triggers:
      - kind: schedule
        cronExpression: "0 8 * * *"
        timezone: UTC
    description: "Process deployment queue and coordinate rollouts"
    
  weekly-client-check-in:
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * 1"
        timezone: UTC
    description: "Review client health metrics and satisfaction"
    
  monthly-platform-audit:
    triggers:
      - kind: schedule
        cronExpression: "0 0 1 * *"
        timezone: UTC
    description: "Comprehensive platform and security audit"

# Integration Settings
integrations:
  render:
    auto_deploy: true
    health_check_enabled: true
    
  github:
    branch_protection:
      main:
        require_pr: true
        required_reviews: 1
    auto_merge: false
    
  monitoring:
    error_threshold: 1%
    latency_threshold_ms: 500
